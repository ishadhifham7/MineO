name: MineO Automated Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3️⃣ Install backend dependencies
      - name: Install backend dependencies
        working-directory: ./server
        run: |
          if [ -f package-lock.json ]; then
            npm ci || (echo "npm ci failed, regenerating lockfile..." && npm install --package-lock-only && npm ci)
          else
            echo "No package-lock.json found, generating one..."
            npm install --package-lock-only
            npm ci
          fi

      # 4️⃣ Install client dependencies
      - name: Install client dependencies
        working-directory: ./client
        run: |
          if [ -f package-lock.json ]; then
            npm ci || (echo "npm ci failed, regenerating lockfile..." && npm install --package-lock-only && npm ci)
          else
            echo "No package-lock.json found, generating one..."
            npm install --package-lock-only
            npm ci
          fi

      # 4.5️⃣ Workaround npm optional dependency bug (rolldown native binding)
      - name: Ensure rolldown Linux binding is present
        if: runner.os == 'Linux'
        working-directory: ./server
        run: npm i --no-save @rolldown/binding-linux-x64-gnu

      # 5️⃣ Run backend tests
      - name: Run backend tests
        working-directory: ./server
        run: |
          echo "Running backend tests..."
          npm test
