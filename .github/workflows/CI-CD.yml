name: Test & Build MineO APK

on:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3️⃣ Install backend dependencies
      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci

      # 4️⃣ Install client dependencies
      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      # 4.5️⃣ Workaround npm optional dependency bug (rolldown native binding)
      - name: Ensure rolldown Linux binding is present
        if: runner.os == 'Linux'
        working-directory: ./server
        run: npm i --no-save @rolldown/binding-linux-x64-gnu

      # 5️⃣ Run backend tests
      - name: Run backend tests
        working-directory: ./server
        run: |
          echo "Running backend tests..."
          npm test

      # 6️⃣ Install EAS CLI
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # 7️⃣ Verify Expo authentication
      - name: Verify Expo authentication
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "::error::Missing EXPO_TOKEN secret. Add it in GitHub: Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "EXPO_TOKEN is present. Verifying account..."
          eas whoami --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 8️⃣ Build APK with EAS
      - name: Build APK with EAS
        id: build
        working-directory: ./client
        run: |
          echo "Starting EAS build..."
          eas build -p android --profile preview --non-interactive --json > build-output.json
          echo "EAS build finished."
          APK_URL=$(jq -r '.artifacts.buildUrl' build-output.json)
          echo "APK_URL=$APK_URL" >> $GITHUB_ENV
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
