name: Test & Build MineO APK

on:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Install backend dependencies
      - name: Install backend dependencies
        working-directory: ./server
        run: npm install

      # 5️⃣ Install client dependencies
      - name: Install client dependencies
        working-directory: ./client
        run: npm install

      # 6️⃣ Run backend tests
      - name: Run backend tests
        working-directory: ./server
        run: |
          echo "Running backend tests..."
          npm test

      # 7️⃣ Install EAS CLI
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # 8️⃣ Verify Expo authentication
      - name: Verify Expo authentication
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "::error::Missing EXPO_TOKEN secret. Add it in GitHub: Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "EXPO_TOKEN is present. Verifying account..."
          eas whoami --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 9️⃣ Build APK with EAS
      - name: Build APK with EAS
        id: build
        working-directory: ./client
        run: |
          echo "Starting EAS build..."
          eas build -p android --profile preview --non-interactive --json > build-output.json
          echo "EAS build finished."
          APK_URL=$(jq -r '.artifacts.buildUrl' build-output.json)
          echo "APK_URL=$APK_URL" >> $GITHUB_ENV
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
