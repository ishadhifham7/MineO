name: Backend Tests Only

on:
  push:
    branches:
      - main

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Run backend tests
      - name: Run backend tests
        working-directory: ./server # adjust if your test file is in a different folder
        run: |
          echo "Running backend tests..."
          npm test   # or the command you use for backend tests
